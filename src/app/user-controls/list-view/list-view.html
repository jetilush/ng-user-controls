<section class="list-view" [attr.aria-label]="label()" role="listbox">
  @if (renderedItems().length === 0) {
    <p class="empty-state" role="status">{{ emptyText() }}</p>
  } @else {
    <ul class="items" role="presentation" cdkDropList (cdkDropListDropped)="reorderItems($event)">
      @for (item of renderedItems(); track item.id) {
        <li role="presentation" cdkDrag [cdkDragDisabled]="item.disabled">
          <button
            class="item"
            type="button"
            role="option"
            [class.is-selected]="isSelected(item)"
            [class.is-disabled]="item.disabled"
            [disabled]="item.disabled"
            [attr.aria-selected]="isSelected(item)"
            (click)="selectItem(item)"
          >
            <span class="drag-handle" cdkDragHandle aria-hidden="true">::</span>
            <span class="title">{{ item.title }}</span>
            @if (item.subtitle) {
              <span class="subtitle">{{ item.subtitle }}</span>
            }
          </button>
        </li>
      }
    </ul>
  }
</section>
